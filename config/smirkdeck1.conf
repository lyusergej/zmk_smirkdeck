// Основные настройки матрицы
CONFIG_ZMK_KSCAN_MATRIX_ROWS=4
CONFIG_ZMK_KSCAN_MATRIX_COLS=12

// Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=n  // Отключение USB (если не нужно)

// Опционально: мощность передатчика и сон
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000  // 15 минут